name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          check-latest: true
          cache: npm
      - run: npm ci
      - name: Build site from public source and Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_DRIVE_SA_KEY }}
          HUMAN_AND_SOCIETY_DRIVE_FOLDER_ID: ${{ vars.HUMAN_AND_SOCIETY_DRIVE_FOLDER_ID }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: output
      - id: deployment
        uses: actions/deploy-pages@v5
