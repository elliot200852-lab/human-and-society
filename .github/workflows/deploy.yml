name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # 台北 09:00 — 每日書單 enrichment + rebuild

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.18.0'
          check-latest: true
          cache: npm
      - run: npm ci
      - name: Enrich book recommendations (Firestore hs-book-recs)
        env:
          FIRESTORE_SA_KEY: ${{ secrets.FIRESTORE_SA_KEY }}
        run: node scripts/enrich-book-recs.js
      - name: Build site from public source and Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_DRIVE_SA_KEY }}
          HUMAN_AND_SOCIETY_DRIVE_FOLDER_ID: ${{ vars.HUMAN_AND_SOCIETY_DRIVE_FOLDER_ID }}
        run: npm run build
      - name: Build booklist static data (Firestore hs-book-recs, approved only)
        env:
          FIRESTORE_SA_KEY: ${{ secrets.FIRESTORE_SA_KEY }}
        run: node scripts/build-booklist.js
      - uses: actions/upload-pages-artifact@v5
        with:
          path: output
      - id: deployment
        uses: actions/deploy-pages@v5
