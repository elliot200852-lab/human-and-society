<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <title>分類 · 人與社會</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ============================================================
       category.html — single-category page
       Reads ?cat=cXX from URL
       ============================================================ */
    body {
      background:
        color-mix(in oklab, var(--cat-accent, var(--accent)) 6%, var(--paper));
      background-attachment: fixed;
      transition: background 240ms ease;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0 0 auto 0;
      height: 360px;
      background: linear-gradient(
        to bottom,
        color-mix(in oklab, var(--cat-accent, var(--accent)) 14%, var(--paper)) 0%,
        color-mix(in oklab, var(--cat-accent, var(--accent)) 6%,  var(--paper)) 80%,
        transparent 100%
      );
      pointer-events: none;
      z-index: 0;
    }

    .page {
      max-width: 1160px;
      margin: 0 auto;
      padding: var(--sp-9) var(--sp-12) var(--sp-15);
      position: relative;
      z-index: 1;
    }

    /* ---- top bar ---- */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: var(--sp-6);
      border-bottom: 1px solid var(--rule);
      margin-bottom: var(--sp-11);
    }
    .topbar a, .topbar .crumbs {
      font-family: var(--font-sans);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .topbar a {
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: color 120ms ease, border-color 120ms ease;
    }
    .topbar a:hover { color: var(--ink); border-bottom-color: var(--rule-2); }
    .topbar .crumbs .sep { color: var(--rule-2); margin: 0 var(--sp-3); }
    .topbar .crumbs .now { color: var(--cat-accent, var(--accent)); font-weight: 500; }

    /* ---- big section header ---- */
    .section-head {
      display: grid;
      grid-template-columns: auto 1fr auto;
      column-gap: var(--sp-9);
      align-items: end;
      margin-bottom: var(--sp-5);
    }
    .section-num {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      font-size: clamp(96px, 14vw, 144px);
      color: var(--cat-accent, var(--accent));
      line-height: 0.85;
      letter-spacing: 0;
      font-feature-settings: "tnum";
      transform: translateY(12px);
    }
    .section-titles { padding-bottom: var(--sp-3); }
    .section-eyebrow {
      font-family: var(--font-sans);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--ls-kicker);
      text-transform: uppercase;
      color: var(--cat-accent, var(--accent));
      margin: 0 0 var(--sp-3);
      font-weight: 500;
    }
    .section-title {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: clamp(36px, 5vw, 52px);
      letter-spacing: 0.08em;
      color: var(--ink);
      margin: 0 0 var(--sp-2);
      line-height: 1.15;
    }
    .section-sub {
      font-family: var(--font-latin-italic);
      font-style: italic;
      font-size: clamp(28px, 3.4vw, 36px);
      color: var(--ink-muted);
      margin: 0;
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .section-count {
      text-align: right;
      padding-bottom: var(--sp-3);
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      color: var(--ink-faint);
      line-height: 1.5;
    }
    .section-count strong {
      display: block;
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      color: var(--cat-accent, var(--accent));
      font-size: 40px;
      letter-spacing: 0;
      line-height: 1;
      margin-bottom: 6px;
      font-feature-settings: "tnum";
    }

    .section-rule {
      width: 100%;
      height: 0;
      border: none;
      border-top: 2px solid var(--cat-accent, var(--accent));
      margin: var(--sp-6) 0 var(--sp-7);
      opacity: 0.9;
    }

    .section-note {
      font-family: var(--font-serif);
      font-size: 17px;
      color: var(--ink-2);
      max-width: 48em;
      letter-spacing: 0.04em;
      line-height: 1.85;
      margin: 0 0 var(--sp-13);
    }

    /* ---- item list: staggered zig-zag, matching index page ---- */
    .items {
      display: flex;
      flex-direction: column;
      gap: var(--sp-5);
    }
    .item {
      position: relative;
      display: grid;
      grid-template-columns: 72px 1fr auto;
      column-gap: var(--sp-6);
      align-items: stretch;
      padding: var(--sp-6) var(--sp-7) var(--sp-6) var(--sp-8);
      width: 86%;
      min-height: 140px;
      background: var(--paper);
      border: 1.5px solid var(--rule-2);
      color: inherit;
      transition: background 160ms ease, border-color 160ms ease, transform 200ms ease;
    }
    .item--left  { margin-right: 14%; margin-left: 0; }
    .item--right { margin-left: 14%;  margin-right: 0; }
    .item::before {
      content: "";
      position: absolute;
      top: -1.5px; bottom: -1.5px;
      width: 6px;
      background: var(--cat-accent, var(--accent));
    }
    .item--left::before  { left: -1.5px; }
    .item--right::before { right: -1.5px; }
    .item:hover {
      background: var(--paper-2);
      border-color: var(--cat-accent, var(--accent));
    }
    .item:hover .card-arrow {
      color: var(--cat-accent, var(--accent));
      transform: translateX(3px);
    }
    .item:hover .card-title { color: var(--cat-accent, var(--accent)); }

    .item-num {
      align-self: center;
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      font-size: 44px;
      color: var(--cat-accent, var(--accent));
      letter-spacing: 0;
      line-height: 1;
      font-feature-settings: "tnum";
      padding-top: 4px;
    }
    .item-body {
      align-self: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .card-title {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: 19px;
      letter-spacing: 0.04em;
      line-height: 1.45;
      color: var(--ink);
      margin: 0;
      transition: color 140ms ease;
      text-wrap: pretty;
    }
    .card-desc {
      font-family: var(--font-serif);
      font-size: 14px;
      color: var(--ink-muted);
      line-height: 1.7;
      letter-spacing: 0.02em;
      margin: 0;
      max-width: 50em;
    }
    .item-end {
      align-self: center;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      min-width: 100px;
      font-family: var(--font-sans);
      font-feature-settings: "tnum";
    }
    .item-date {
      font-size: 12px;
      letter-spacing: var(--ls-wide);
      color: var(--ink-2);
      font-weight: 500;
    }
    .item-size {
      font-size: 11px;
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      color: var(--ink-faint);
    }
    .card-arrow {
      color: var(--ink-muted);
      font-family: var(--font-serif);
      font-size: 20px;
      letter-spacing: 0;
      transition: color 140ms ease, transform 180ms ease;
      margin-top: var(--sp-3);
      line-height: 1;
    }

    /* ---- prev / next nav ---- */
    .pager {
      margin-top: var(--sp-13);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border-top: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .pager-cell {
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 4px;
      padding: var(--sp-7) var(--sp-7);
      color: inherit;
      transition: background 160ms ease;
    }
    .pager-prev { border-right: 1px solid var(--rule); }
    .pager-next { text-align: right; }
    .pager-cell:hover { background: var(--paper-2); }
    .pager-cell:hover .pager-title { color: var(--pcell-accent, var(--accent)); }
    .pager-label {
      font-family: var(--font-sans);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      color: var(--ink-faint);
    }
    .pager-title {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: 22px;
      letter-spacing: 0.06em;
      color: var(--ink);
      line-height: 1.3;
      transition: color 140ms ease;
    }
    .pager-sub {
      font-family: var(--font-latin-italic);
      font-style: italic;
      font-size: 18px;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .pager-cell.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* ---- back to contents ---- */
    .back-contents {
      display: flex;
      justify-content: center;
      margin-top: var(--sp-11);
    }
    .back-contents a {
      font-family: var(--font-sans);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--ls-kicker);
      text-transform: uppercase;
      color: var(--ink-muted);
      padding: 12px 26px;
      border: 1px solid var(--rule-2);
      border-radius: 1px;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }
    .back-contents a:hover {
      background: var(--cat-accent, var(--accent));
      color: var(--paper);
      border-color: var(--cat-accent, var(--accent));
    }

    /* ---- colophon ---- */
    .colophon {
      margin-top: var(--sp-13);
      padding-top: var(--sp-8);
      border-top: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--sp-6);
      align-items: end;
    }
    .colophon .school {
      font-family: var(--font-serif);
      font-size: 14px;
      letter-spacing: 0.18em;
      color: var(--ink-2);
    }
    .colophon .school .en {
      display: block;
      font-family: var(--font-latin-book);
      font-style: italic;
      letter-spacing: 0.02em;
      color: var(--ink-faint);
      font-size: 12.5px;
      margin-top: 4px;
    }
    .colophon .stamp {
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      color: var(--ink-faint);
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      text-align: right;
      line-height: 1.9;
    }

    @media (max-width: 900px) {
      .page { padding: var(--sp-7) var(--sp-7) var(--sp-13); }
      .section-head { grid-template-columns: auto 1fr; row-gap: var(--sp-4); }
      .section-num { font-size: 84px; }
      .section-count { grid-column: 1 / -1; text-align: left; }
      .section-count strong { display: inline-block; font-size: 28px; margin-right: var(--sp-3); margin-bottom: 0; vertical-align: -2px; }
      .item { width: 100%; margin: 0 !important; grid-template-columns: 56px 1fr auto; column-gap: var(--sp-5); padding: var(--sp-5) var(--sp-5) var(--sp-5) var(--sp-7); }
      .item--right::before { left: -1.5px; right: auto; }
      .item-num { font-size: 36px; }
      .item-end { min-width: 72px; }
      .pager { grid-template-columns: 1fr; }
      .pager-prev { border-right: none; border-bottom: 1px solid var(--rule); }
      .pager-next { text-align: left; }
    }
    @media (max-width: 560px) {
      .page { padding: var(--sp-6) var(--sp-5) var(--sp-11); }
      .item { grid-template-columns: 1fr auto; padding: var(--sp-5) var(--sp-5) var(--sp-5) var(--sp-6); }
      .item-num { display: none; }
      .card-title { font-size: 16.5px; }
      .card-desc { font-size: 13px; }
      .topbar { flex-direction: column; gap: var(--sp-3); align-items: flex-start; }
    }

    /* hide page contents until JS resolves cat id */
    .page[data-loaded="0"] .section-head,
    .page[data-loaded="0"] .section-note,
    .page[data-loaded="0"] .items,
    .page[data-loaded="0"] .pager,
    .page[data-loaded="0"] .back-contents { opacity: 0; }

    /* not-found fallback */
    .notfound {
      padding: var(--sp-15) 0;
      text-align: center;
      font-family: var(--font-serif);
      color: var(--ink-muted);
    }
    .notfound h2 { font-weight: 500; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <div class="page" id="page" data-loaded="0">

    <header class="topbar">
      <a href="index.html">← 回主頁</a>
      <p class="crumbs">
        分類目錄
        <span class="sep">/</span>
        <span class="now" id="crumbNow">…</span>
      </p>
    </header>

    <header class="section-head">
      <div class="section-num" id="secNum"></div>
      <div class="section-titles">
        <p class="section-eyebrow">Section <span id="secEyebrow"></span></p>
        <h1 class="section-title" id="secTitle"></h1>
        <p class="section-sub" id="secSub"></p>
      </div>
      <div class="section-count">
        <strong id="secCount"></strong>
        件
      </div>
    </header>

    <hr class="section-rule" />

    <p class="section-note" id="secNote"></p>

    <main class="items" id="items"></main>

    <nav class="pager" id="pager" aria-label="分類分頁"></nav>

    <div class="back-contents">
      <a href="index.html">↑ 回到主頁目錄</a>
    </div>

    <footer class="colophon">
      <div class="school">
        慈心華德福高中
        <span class="en">Ci-Xin Waldorf School · Yilan</span>
      </div>
      <div class="stamp">
        人與社會教師社團<br />
        Powered by TeacherOS
      </div>
    </footer>

    <div class="notfound" id="notfound" style="display:none">
      <h2>找不到這個分類</h2>
      <p>請<a href="index.html" class="italic-book">回到主頁</a>挑選一個分類。</p>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    (function () {
      const { CATEGORIES, urlFor } = window.DATA;

      const params = new URLSearchParams(location.search);
      const catId = params.get('cat') || CATEGORIES[0].id;
      const idx = CATEGORIES.findIndex(c => c.id === catId);

      if (idx < 0) {
        document.getElementById('page').style.display = 'none';
        document.getElementById('notfound').style.display = 'block';
        return;
      }

      const cat = CATEGORIES[idx];
      const prev = idx > 0 ? CATEGORIES[idx - 1] : null;
      const next = idx < CATEGORIES.length - 1 ? CATEGORIES[idx + 1] : null;

      // set page accent
      document.documentElement.style.setProperty('--cat-accent', cat.accent);
      document.title = `${cat.num} ${cat.title} · 人與社會`;

      // header
      document.getElementById('secNum').textContent = cat.num;
      document.getElementById('secEyebrow').textContent = cat.num + ' · ' + cat.subtitle;
      document.getElementById('secTitle').textContent = cat.title;
      document.getElementById('secSub').textContent = cat.subtitle;
      document.getElementById('secCount').textContent = cat.items.length;
      document.getElementById('secNote').textContent = cat.note;
      document.getElementById('crumbNow').textContent = cat.num + ' ' + cat.title;

      // items (staggered zig-zag)
      const items = document.getElementById('items');
      items.innerHTML = cat.items.map((item, i) => {
        const side = i % 2 === 0 ? 'left' : 'right';
        const num = String(i + 1).padStart(2, '0');
        return `
          <a class="item item--${side}" href="${urlFor(cat, item)}">
            <div class="item-num">${num}</div>
            <div class="item-body">
              <h3 class="card-title">${escapeHtml(item.title)}</h3>
              <p class="card-desc">${escapeHtml(item.desc)}</p>
            </div>
            <div class="item-end">
              <span class="item-date">${escapeHtml(item.date)}</span>
              <span class="item-size">${escapeHtml(item.size)}</span>
              <span class="card-arrow" aria-hidden="true">↗</span>
            </div>
          </a>
        `;
      }).join('');

      // pager (prev / next)
      const pager = document.getElementById('pager');
      pager.innerHTML = `
        ${prev
          ? `<a class="pager-cell pager-prev" href="category.html?cat=${prev.id}" style="--pcell-accent:${prev.accent}">
              <span class="pager-label">← 前一分類 · ${prev.num}</span>
              <span class="pager-title">${escapeHtml(prev.title)}</span>
              <span class="pager-sub">${escapeHtml(prev.subtitle)}</span>
            </a>`
          : `<div class="pager-cell pager-prev disabled">
              <span class="pager-label">— 起始 —</span>
              <span class="pager-title">這是第一個分類</span>
              <span class="pager-sub">&nbsp;</span>
            </div>`}
        ${next
          ? `<a class="pager-cell pager-next" href="category.html?cat=${next.id}" style="--pcell-accent:${next.accent}">
              <span class="pager-label">下一分類 · ${next.num} →</span>
              <span class="pager-title">${escapeHtml(next.title)}</span>
              <span class="pager-sub">${escapeHtml(next.subtitle)}</span>
            </a>`
          : `<div class="pager-cell pager-next disabled">
              <span class="pager-label">— 終點 —</span>
              <span class="pager-title">這是最後一個分類</span>
              <span class="pager-sub">&nbsp;</span>
            </div>`}
      `;

      document.getElementById('page').setAttribute('data-loaded', '1');

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      }
    })();
  </script>
  <script src="js/toolbar.js" defer></script>
</body>
</html>
