<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <title>人與社會｜教師社團</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ============================================================
       index.html — topic list (staggered)
       ============================================================ */
    body {
      background: var(--paper);
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(61,77,104,0.045), transparent 70%),
        radial-gradient(ellipse 80% 40% at 50% 100%, rgba(61,77,104,0.045), transparent 70%);
    }

    .page {
      max-width: 1160px;
      margin: 0 auto;
      padding: var(--sp-9) var(--sp-12) var(--sp-15);
    }

    /* ---- masthead ---- */
    .masthead {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--sp-7);
      align-items: end;
      padding-bottom: var(--sp-7);
      border-bottom: 1px solid var(--rule);
    }
    .masthead-kicker {
      font-family: var(--font-sans);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--ls-kicker);
      text-transform: uppercase;
      color: var(--accent);
      margin: 0 0 var(--sp-4);
      font-weight: 500;
    }
    .masthead-title {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: clamp(38px, 5.4vw, 56px);
      letter-spacing: 0.14em;
      margin: 0 0 var(--sp-2);
      color: var(--ink);
      line-height: 1.1;
      padding-left: 0.14em;
    }
    .masthead-sub {
      font-family: var(--font-latin-italic);
      font-style: italic;
      font-size: clamp(28px, 3.5vw, 38px);
      color: var(--ink-muted);
      margin: 0;
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .masthead-meta {
      font-family: var(--font-sans);
      font-size: var(--fs-small);
      color: var(--ink-muted);
      text-align: right;
      line-height: 2;
    }
    .masthead-meta .label {
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      font-size: var(--fs-eyebrow);
      color: var(--ink-faint);
      margin-right: var(--sp-2);
    }
    .masthead-meta .val {
      color: var(--ink);
      font-feature-settings: "tnum";
      font-weight: 500;
    }

    /* ---- quicklinks ---- */
    .quicklinks {
      display: flex;
      justify-content: flex-end;
      padding-top: var(--sp-4);
    }
    .quicklinks-link {
      font-family: var(--font-sans);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      color: var(--ink-muted);
      padding: 8px 18px;
      border: 1px solid var(--rule-2);
      border-radius: 999px;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }
    .quicklinks-link:hover {
      background: var(--accent);
      color: var(--paper);
      border-color: var(--accent);
    }

    /* ---- tagline strip ---- */
    .tagline {
      padding: var(--sp-9) 0 var(--sp-11);
      max-width: 720px;
      font-family: var(--font-serif);
      font-size: 17px;
      line-height: 2;
      letter-spacing: 0.04em;
      color: var(--ink);
      margin: 0;
      text-align: justify;
      text-justify: inter-ideograph;
    }
    .tagline .lead-line {
      display: block;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin: 0 0 var(--sp-5);
      line-height: 1.6;
    }
    .tagline .signature {
      display: block;
      margin-top: var(--sp-6);
      font-family: var(--font-sans);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* ---- contents header ---- */
    .contents-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: var(--sp-4);
      border-bottom: 1px solid var(--rule);
      margin-bottom: var(--sp-2);
    }
    .contents-head .label {
      font-family: var(--font-sans);
      font-size: var(--fs-eyebrow);
      letter-spacing: var(--ls-kicker);
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin: 0;
    }
    .contents-head .count {
      font-family: var(--font-latin-book);
      font-style: italic;
      color: var(--ink-faint);
      font-size: 15px;
      letter-spacing: 0.04em;
    }

    /* ---- staggered list ---- */
    .toc-list {
      display: flex;
      flex-direction: column;
    }
    .row {
      position: relative;
      display: grid;
      grid-template-columns: 96px 1fr auto;
      column-gap: var(--sp-7);
      align-items: stretch;
      padding: var(--sp-7) var(--sp-8) var(--sp-7) var(--sp-9);
      border-bottom: 1px solid var(--rule);
      color: inherit;
      transition: background 160ms ease;
      width: 82%;
      min-height: 130px;
    }
    .row:first-child { border-top: 1px solid var(--rule); }
    .row:hover { background: var(--paper-2); }

    /* alternating anchor side */
    .row--left  { margin-right: 18%; margin-left: 0; }
    .row--right { margin-left: 18%; margin-right: 0; }

    /* colored accent rule on the anchor side (the page-edge side) */
    .row::before {
      content: "";
      position: absolute;
      top: 0; bottom: 0;
      width: 3px;
      background: var(--cat-accent, var(--accent));
      opacity: 0.85;
    }
    .row--left::before  { left: 0; }
    .row--right::before { right: 0; }

    .row-num {
      align-self: center;
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      font-size: 64px;
      color: var(--cat-accent, var(--accent));
      letter-spacing: 0;
      line-height: 1;
      font-feature-settings: "tnum";
      padding-top: 6px;
    }

    .row-body {
      align-self: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .row-titles {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      column-gap: var(--sp-5);
      row-gap: 2px;
    }
    .row-title {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: clamp(22px, 2.4vw, 26px);
      letter-spacing: 0.06em;
      color: var(--ink);
      margin: 0;
      line-height: 1.25;
      transition: color 140ms ease;
    }
    .row-sub {
      font-family: var(--font-latin-italic);
      font-style: italic;
      font-size: clamp(20px, 2vw, 22px);
      color: var(--ink-muted);
      margin: 0;
      letter-spacing: 0.02em;
      line-height: 1;
    }
    .row-note {
      font-family: var(--font-serif);
      font-size: 14.5px;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      line-height: 1.7;
      margin: 0;
      max-width: 38em;
    }

    .row-end {
      align-self: center;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 6px;
      min-width: 96px;
    }
    .row-count {
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 400;
      font-size: 24px;
      color: var(--cat-accent, var(--accent));
      letter-spacing: 0;
      line-height: 1;
      font-feature-settings: "tnum";
    }
    .row-count-label {
      font-family: var(--font-sans);
      font-size: 10.5px;
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      color: var(--ink-faint);
    }
    .row-arrow {
      font-family: var(--font-serif);
      font-style: normal;
      font-size: 22px;
      color: var(--ink-muted);
      margin-top: var(--sp-3);
      transition: color 140ms ease, transform 200ms ease;
      line-height: 1;
    }
    .row:hover .row-arrow {
      color: var(--cat-accent, var(--accent));
      transform: translateX(4px);
    }
    .row:hover .row-title {
      color: var(--cat-accent, var(--accent));
    }

    /* ---- colophon ---- */
    .colophon {
      margin-top: var(--sp-14);
      padding-top: var(--sp-9);
      border-top: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--sp-6);
      align-items: end;
    }
    .colophon .school {
      font-family: var(--font-serif);
      font-size: 15px;
      letter-spacing: 0.18em;
      color: var(--ink-2);
    }
    .colophon .school .en {
      display: block;
      font-family: var(--font-latin-book);
      font-style: italic;
      letter-spacing: 0.02em;
      color: var(--ink-faint);
      font-size: 13px;
      margin-top: 4px;
    }
    .colophon .stamp {
      font-family: var(--font-sans);
      font-size: var(--fs-caption);
      color: var(--ink-faint);
      letter-spacing: var(--ls-caps);
      text-transform: uppercase;
      text-align: right;
      line-height: 1.9;
    }
    .colophon .stamp strong { color: var(--ink-muted); font-weight: 400; }

    @media (max-width: 900px) {
      .page { padding: var(--sp-7) var(--sp-7) var(--sp-13); }
      .masthead { grid-template-columns: 1fr; gap: var(--sp-5); align-items: start; }
      .masthead-meta { text-align: left; }
      .row { width: 100%; margin: 0 !important; grid-template-columns: 64px 1fr auto; column-gap: var(--sp-5); padding: var(--sp-6) var(--sp-5) var(--sp-6) var(--sp-6); }
      .row--right::before { left: 0; right: auto; }
      .row-num { font-size: 44px; }
      .row-end { min-width: 56px; }
    }
    @media (max-width: 560px) {
      .page { padding: var(--sp-6) var(--sp-5) var(--sp-11); }
      .row { grid-template-columns: 1fr auto; padding: var(--sp-6) var(--sp-5) var(--sp-6) var(--sp-7); }
      .row-num { display: none; }
      .row-title { font-size: 20px; }
      .row-sub { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="masthead">
      <div>
        <p class="masthead-kicker">Ci-Xin Waldorf · Teacher Circle</p>
        <h1 class="masthead-title">人與社會</h1>
        <p class="masthead-sub">Human &amp; Society</p>
      </div>
      <div class="masthead-meta">
        <div><span class="label">Items</span><span class="val" id="metaCount">1 件</span></div>
        <div><span class="label">Sections</span><span class="val" id="metaCats">1 類</span></div>
        <div><span class="label">Updated</span><span class="val" id="metaUpdated">2026 / 07 / 12</span></div>
      </div>
    </header>

    <nav class="quicklinks" aria-label="快速連結">
      <a class="quicklinks-link" href="booklist.html">推薦書單 <span aria-hidden="true">→</span></a>
    </nav>

    <p class="tagline">
      <span class="lead-line">從台灣出發，與世界建立連結</span>
      人與社會工作小組的文件與共同學習紀錄,依主題收於下方。點選任一分類,進入該主題的內容。
      <span class="signature">人與社會教師社團 · 慈心華德福高中</span>
    </p>

    <div class="contents-head">
      <p class="label">分類目錄 · Contents</p>
      <p class="count italic-book" id="contentsCount">One section</p>
    </div>

    <nav class="toc-list" id="tocList" aria-label="主題分類"></nav>

    <footer class="colophon">
      <div class="school">
        慈心華德福高中
        <span class="en">Ci-Xin Waldorf School · Yilan</span>
      </div>
      <div class="stamp">
        人與社會教師社團<br />
        <strong id="metaUpdatedFoot">Updated 2026 / 07 / 12</strong>
      </div>
    </footer>
  </div>

  <script src="data.js"></script>
  <script>
    (function () {
      const { CATEGORIES, META } = window.DATA;

      // populate dynamic meta
      const totalItems = CATEGORIES.reduce((sum, c) => sum + c.items.length, 0);
      const formatDate = d => (d || '').replace(/-/g, ' / ');
      const formatted = formatDate(META.updated);
      document.getElementById('metaCount').textContent = totalItems + ' 件';
      document.getElementById('metaCats').textContent = CATEGORIES.length + ' 類';
      document.getElementById('metaUpdated').textContent = formatted;
      document.getElementById('metaUpdatedFoot').textContent = 'Updated ' + formatted;

      const list = document.getElementById('tocList');
      list.innerHTML = CATEGORIES.map((cat, i) => {
        const side = i % 2 === 0 ? 'left' : 'right';
        return `
          <a class="row row--${side}" href="category.html?cat=${cat.id}" style="--cat-accent:${cat.accent}">
            <div class="row-num">${cat.num}</div>
            <div class="row-body">
              <div class="row-titles">
                <h2 class="row-title">${escapeHtml(cat.title)}</h2>
                <p class="row-sub">${escapeHtml(cat.subtitle)}</p>
              </div>
              <p class="row-note">${escapeHtml(cat.note)}</p>
            </div>
            <div class="row-end">
              <span class="row-count">${cat.items.length}</span>
              <span class="row-count-label">件</span>
              <span class="row-arrow" aria-hidden="true">→</span>
            </div>
          </a>
        `;
      }).join('');

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
      }
    })();
  </script>
  <script src="js/toolbar.js" defer></script>
</body>
</html>
